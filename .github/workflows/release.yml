name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build

      - name: Update README version and commit
        run: |
          git checkout master
          git stash
          git pull --rebase
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/:miniinjector-runtime:[0-9.]*'/:miniinjector-runtime:$VERSION'/g" README.md
          sed -i "s/:miniinjector-processor:[0-9.]*'/:miniinjector-processor:$VERSION'/g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || (git commit -m "docs: update latest version to ${GITHUB_REF_NAME#v} [skip ci]" && git push)

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
