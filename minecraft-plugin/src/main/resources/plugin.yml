name: MiniInjectorExample
version: ${project.version}
main: com.github.playernguyen.minecraft.MiniInjectorPlugin
description: Example Spigot plugin demonstrating MiniInjector DI framework
authors:
  - PlayerNguyen

commands:
  playerinfo:
    description: Get information about a player
    usage: /playerinfo <player_name>
  givereward:
    description: Give a reward to a player
    usage: /givereward <player_name> <amount>
  stats:
    description: View player statistics
    usage: /stats
